# Enable mouse support: allows scrolling, pane selection, and resizing with the mouse
# Note: hold Shift to bypass tmux mouse mode and select text normally (e.g. for terminal copy-paste)
set -g mouse on

# Set the base index for windows and panes to 1 (instead of the default 0)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

unbind '"'
unbind %
bind - split-window -v
bind | split-window -h
